name: tuskira

services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tuskira
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tuskira
      SERVER_PORT: "8080"
      QUEUE_PROVIDER: river
      SCHEDULER_PROVIDER: river
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRY: 24h
    depends_on:
      postgres:
        condition: service_started

volumes:
  pgdata:
